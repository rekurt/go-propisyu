name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go tooling
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: go mod tidy
        run: make tidy

      - name: gosec
        run: make secure

      - name: golangci-lint
        run: make lint

      - name: go test
        run: make test
