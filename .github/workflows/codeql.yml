name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # every Monday

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - uses: github/codeql-action/analyze@v3
