version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gosec
    - bodyclose
    - errcheck
    - err113
    - errorlint
    - govet
    - staticcheck
    - revive
    - unused
    - ineffassign
    - unconvert
    - gocyclo
    - gocognit
    - dupl
    - funlen
    - goconst
    - gochecknoglobals
    - gochecknoinits
    - prealloc
    - misspell
    - whitespace
    - lll
    - nakedret
    - goprintffuncname
    - gocritic
    - dogsled
    - rowserrcheck
    - unparam
    - godox
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104

    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - composites
        - shadow

    revive:
      severity: warning
      confidence: 0.8
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003

    gocritic:
      disabled-checks:
        - captLocal
        - commentFormatting
        - ifElseChain
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
      settings:
        hugeParam:
          sizeThreshold: 80
        rangeValCopy:
          sizeThreshold: 512

    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 100

    funlen:
      lines: 80
      statements: 50

    goconst:
      min-len: 3
      min-occurrences: 3

    lll:
      line-length: 140
      tab-width: 4

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout

formatters:
  enable:
    - gofmt
    - goimports

severity:
  default: warning
  rules:
    - linters:
        - gosec
        - govet
        - errcheck
      severity: error
